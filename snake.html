<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #222;
            font-family: 'Press Start 2P', cursive, monospace;
            color: #eee;
            user-select: none;
        }

        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        canvas {
            background-color: #333;
            border: 2px solid #555;
            display: block;
            margin-bottom: 20px;
        }

        #score, #game-over {
            margin-top: 10px;
            font-size: 1.2em;
        }

        #game-over {
            color: #ff4444;
            font-size: 1.5em;
            text-align: center;
            display: none; /* Hidden by default */
        }

        button {
            background-color: #4CAF50; /* Green */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Snake</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="score">Score: 0</div>
    <div id="game-over">Game Over!<br>Press 'R' or click to Restart</div>
    <button id="restartButton" style="display:none;">Restart Game</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const gameOverDisplay = document.getElementById('game-over');
        const restartButton = document.getElementById('restartButton');

        const gridSize = 20; // Size of each segment of the snake and food
        const tileCount = canvas.width / gridSize; // Number of tiles in each dimension

        let snake = [{ x: 10, y: 10 }]; // Initial snake position
        let food = {}; // Food position
        let dx = 0; // x velocity
        let dy = 0; // y velocity
        let score = 0;
        let changingDirection = false;
        let gameOver = false;
        let gameInterval;
        let gameSpeed = 100; // milliseconds

        function generateFood() {
            let newFoodX, newFoodY;
            let collisionWithSnake;
            do {
                newFoodX = Math.floor(Math.random() * tileCount);
                newFoodY = Math.floor(Math.random() * tileCount);
                collisionWithSnake = snake.some(segment => segment.x === newFoodX && segment.y === newFoodY);
            } while (collisionWithSnake);

            food = { x: newFoodX, y: newFoodY };
        }

        function drawSegment(segment, color) {
            ctx.fillStyle = color;
            ctx.strokeStyle = '#222';
            ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
            ctx.strokeRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
        }

        function drawSnake() {
            snake.forEach((segment, index) => {
                drawSegment(segment, index === 0 ? '#00FF00' : '#00CC00'); // Head green, body dark green
            });
        }

        function drawFood() {
            drawSegment(food, '#FF0000'); // Food red
        }

        function clearCanvas() {
            ctx.fillStyle = '#333';
            ctx.strokeStyle = '#555';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }

        function moveSnake() {
            if (gameOver) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); // Add new head

            const didEatFood = head.x === food.x && head.y === food.y;
            if (didEatFood) {
                score += 10;
                scoreDisplay.textContent = `Score: ${score}`;
                generateFood(); // Generate new food, snake grows
            } else {
                snake.pop(); // Remove tail, snake moves normally
            }
        }

        function checkCollision() {
            // Check if snake hits wall
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= tileCount;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= tileCount;

            if (hitLeftWall || hitRightWall || hitTopWall || hitBottomWall) {
                gameOver = true;
                return;
            }

            // Check if snake hits itself
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
                    gameOver = true;
                    return;
                }
            }
        }

        function gameLoop() {
            if (gameOver) {
                clearInterval(gameInterval);
                gameOverDisplay.style.display = 'block';
                restartButton.style.display = 'block';
                return;
            }

            changingDirection = false; // Allow direction changes again after a tick
            clearCanvas();
            drawFood();
            moveSnake();
            checkCollision();
            drawSnake();
        }

        function changeDirection(event) {
            if (changingDirection || gameOver) return;
            changingDirection = true;

            const keyPressed = event.keyCode;
            const LEFT_KEY = 37;
            const UP_KEY = 38;
            const RIGHT_KEY = 39;
            const DOWN_KEY = 40;
            const R_KEY = 82; // R key for restart

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingLeft = dx === -1;
            const goingRight = dx === 1;

            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -1;
                dy = 0;
            } else if (keyPressed === UP_KEY && !goingDown) {
                dx = 0;
                dy = -1;
            } else if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = 1;
                dy = 0;
            } else if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0;
                dy = 1;
            } else if (keyPressed === R_KEY && gameOver) {
                resetGame();
            }
        }

        function resetGame() {
            clearInterval(gameInterval);
            snake = [{ x: 10, y: 10 }];
            dx = 0;
            dy = 0;
            score = 0;
            scoreDisplay.textContent = `Score: ${score}`;
            gameOver = false;
            changingDirection = false;
            gameOverDisplay.style.display = 'none';
            restartButton.style.display = 'none';
            generateFood();
            startGame();
        }

        function startGame() {
            // Initial direction (e.g., right)
            dx = 1;
            dy = 0;
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        // Initialize game
        document.addEventListener('keydown', changeDirection);
        restartButton.addEventListener('click', resetGame);

        generateFood();
        startGame(); // Start the game when the page loads
    </script>
</body>
</html>
