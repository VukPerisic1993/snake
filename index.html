<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Snake Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #282c34;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        canvas {
            background-color: #000;
            border: 2px solid #61dafb;
        }
        #score {
            margin-top: 10px;
            font-size: 1.5em;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1em;
            background-color: #61dafb;
            color: #282c34;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #21a1f1;
        }
    </style>
</head>
<body>
    <h1>Simple Snake Game</h1>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="score">Score: 0</div>
    <button id="startButton">Start Game</button>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const startButton = document.getElementById('startButton');

        const gridSize = 20;
        let snake = [{ x: 10, y: 10 }];
        let food = {};
        let dx = 0; // horizontal velocity
        let dy = 0; // vertical velocity
        let score = 0;
        let gameInterval;
        let gameRunning = false;
        let changingDirection = false; // To prevent rapid-fire direction changes

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * (canvas.width / gridSize)),
                y: Math.floor(Math.random() * (canvas.height / gridSize))
            };

            // Ensure food does not spawn on the snake
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood(); // Regenerate if collision
                }
            });
        }

        function drawRect(x, y, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * gridSize, y * gridSize, gridSize - 1, gridSize - 1);
        }

        function drawGame() {
            if (!gameRunning) return;

            changingDirection = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear canvas

            // Draw food
            drawRect(food.x, food.y, 'red');

            // Draw snake
            snake.forEach(part => drawRect(part.x, part.y, 'lime'));

            // Move snake
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            snake.unshift(head); // Add new head

            // Check for collision with food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = `Score: ${score}`;
                generateFood(); // Generate new food
            } else {
                snake.pop(); // Remove tail if no food eaten
            }

            // Check for game over
            if (
                head.x < 0 || head.x >= canvas.width / gridSize ||
                head.y < 0 || head.y >= canvas.height / gridSize ||
                checkCollision(head)
            ) {
                gameOver();
            }
        }

        function checkCollision(head) {
            // Check if snake collides with itself (starting from the 4th segment to avoid immediate self-collision after turning)
            for (let i = 4; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        function changeDirection(event) {
            if (changingDirection) return;
            changingDirection = true;

            const keyPressed = event.keyCode;
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingLeft = dx === -1;
            const goingRight = dx === 1;

            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -1;
                dy = 0;
            }
            if (keyPressed === UP_KEY && !goingDown) {
                dx = 0;
                dy = -1;
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = 1;
                dy = 0;
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0;
                dy = 1;
            }
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 0;
            dy = 0;
            score = 0;
            scoreDisplay.textContent = `Score: ${score}`;
            generateFood();
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear canvas
            drawRect(snake[0].x, snake[0].y, 'lime'); // Draw initial snake head
            drawRect(food.x, food.y, 'red'); // Draw initial food
            startButton.textContent = "Start Game";
            startButton.disabled = false;
        }

        function startGame() {
            if (gameRunning) return; // Prevent multiple starts
            gameRunning = true;
            resetGame(); // Ensure clean state
            startButton.textContent = "Playing...";
            startButton.disabled = true; // Disable during play
            // Set initial direction to right
            dx = 1;
            dy = 0;
            gameInterval = setInterval(drawGame, 150); // Game speed
        }

        function gameOver() {
            clearInterval(gameInterval);
            gameRunning = false;
            alert(`Game Over! Your score: ${score}`);
            startButton.textContent = "Restart Game";
            startButton.disabled = false;
        }

        document.addEventListener('keydown', changeDirection);
        startButton.addEventListener('click', startGame);

        // Initial setup
        resetGame(); // Display initial snake and food before game starts
    </script>
</body>
</html>
